<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hesap Makinesi</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .calculator { max-width: 300px; margin: auto; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; font-size: 18px; }
        button { cursor: pointer; }
        .result { margin-top: 10px; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="number" id="num1" placeholder="Birinci sayı">
        <input type="number" id="num2" placeholder="İkinci sayı">
        <select id="operation">
            <option value="add">Toplama</option>
            <option value="subtract">Çıkarma</option>
            <option value="multiply">Çarpma</option>
            <option value="divide">Bölme</option>
        </select>
        <button onclick="calculate()">Hesapla</button>
        <div class="result" id="result"></div>
    </div>

    <script>
        function calculate() {
            const num1 = parseFloat(document.getElementById('num1').value);
            const num2 = parseFloat(document.getElementById('num2').value);
            const operation = document.getElementById('operation').value;
            let result;
            if (isNaN(num1) || isNaN(num2)) {
                result = 'Lütfen geçerli sayılar giriniz.';
            } else {
                switch(operation) {
                    case 'add':
                        result = num1 + num2;
                        break;
                    case 'subtract':
                        result = num1 - num2;
                        break;
                    case 'multiply':
                        result = num1 * num2;
                        break;
                    case 'divide':
                        if (num2 === 0) {
                            result = 'Bir sayı sıfıra bölünemez.';
                        } else {
                            result = num1 / num2;
                        }
                        break;
                }
            }
            document.getElementById('result').textContent = result;
        }
    </script>
</body>
</html>
